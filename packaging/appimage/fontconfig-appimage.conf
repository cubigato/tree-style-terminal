<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
	<!-- Always provide the font bundled relative to this configuration. -->
	<dir prefix="relative">../../usr/share/fonts</dir>

	<!-- Also make ordinary system and user fonts available. -->
	<dir>/usr/local/share/fonts</dir>
	<dir>/usr/share/fonts</dir>
	<dir prefix="xdg">fonts</dir>
	<dir>~/.fonts</dir>

	<include ignore_missing="yes" prefix="relative">conf.d</include>

	<!-- Never redirect these through the read-only AppImage sysroot. -->
	<cachedir prefix="xdg">fontconfig</cachedir>
	<cachedir>~/.fontconfig</cachedir>

	<config>
		<rescan>
			<int>30</int>
		</rescan>
	</config>
</fontconfig>
